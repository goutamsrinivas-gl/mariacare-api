<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MariaCare Doctor Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #0f3460;
    }

    header p {
      margin-top: 6px;
      color: #555;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #0f3460;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .fields { grid-template-columns: 1fr; }
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field label span {
      font-weight: 400;
      color: #999;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.75rem;
    }

    .field input, .field select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #dde3ec;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #1a1a2e;
      background: #fafbfd;
      transition: border-color 0.2s;
      outline: none;
    }

    .field input:focus, .field select:focus {
      border-color: #0f3460;
      background: #fff;
    }

    .field input::placeholder {
      color: #bbb;
    }

    button {
      margin-top: 24px;
      padding: 12px 32px;
      background: #0f3460;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #16213e; }
    button:disabled { background: #aaa; cursor: not-allowed; }

    .status {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #888;
      min-height: 20px;
    }

    .status.error { color: #c0392b; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .output-header h2 {
      margin: 0;
    }

    .badge {
      background: #e8f0fe;
      color: #0f3460;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }

    pre {
      background: #0d1117;
      color: #e6edf3;
      border-radius: 8px;
      padding: 20px;
      font-size: 0.82rem;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 60px;
    }

    .placeholder-text {
      color: #555;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>MariaCare Doctor Search</h1>
      <p>Search for doctors and clinics — typos in names and locations are handled automatically.</p>
    </header>

    <div class="card">
      <h2>Search Parameters</h2>
      <div class="fields">
        <div class="field">
          <label>Location <span>(supports typos)</span></label>
          <input id="location" type="text" placeholder="e.g. Bukalest" />
        </div>
        <div class="field">
          <label>Specialty <span>(supports typos)</span></label>
          <input id="specialty" type="text" placeholder="e.g. Cardiologgy" />
        </div>
        <div class="field">
          <label>Doctor Name <span>(optional, supports typos)</span></label>
          <input id="doctor_name" type="text" placeholder="e.g. Dobert Ionescu" />
        </div>
        <div class="field">
          <label>Clinic Name <span>(optional, supports typos)</span></label>
          <input id="clinic_name" type="text" placeholder="e.g. Clinica Cluj" />
        </div>
        <div class="field">
          <label>Language</label>
          <select id="language">
            <option value="">Any language</option>
            <option>Romanian</option>
            <option>English</option>
            <option>French</option>
            <option>German</option>
            <option>Hungarian</option>
            <option>Italian</option>
            <option>Spanish</option>
          </select>
        </div>
        <div class="field">
          <label>Requested Time <span>(e.g. Monday 10:00)</span></label>
          <input id="requested_time" type="text" placeholder="e.g. Monday 10:00" />
        </div>
      </div>

      <button id="searchBtn" onclick="doSearch()">Search</button>
      <div class="status" id="status"></div>
    </div>

    <div class="card">
      <div class="output-header">
        <h2>API Response</h2>
        <span class="badge" id="resultBadge" style="display:none"></span>
      </div>
      <pre id="output"><span class="placeholder-text">Results will appear here...</span></pre>
    </div>
  </div>

  <script>
    async function doSearch() {
      const btn = document.getElementById("searchBtn");
      const status = document.getElementById("status");
      const output = document.getElementById("output");
      const badge = document.getElementById("resultBadge");

      const body = {};
      const fields = ["location", "specialty", "doctor_name", "clinic_name", "language", "requested_time"];
      fields.forEach(f => {
        const val = document.getElementById(f).value.trim();
        if (val) body[f] = val;
      });

      if (!body.location && !body.specialty && !body.doctor_name && !body.clinic_name) {
        status.textContent = "Please enter at least one of: location, specialty, doctor name, or clinic name.";
        status.className = "status error";
        return;
      }

      btn.disabled = true;
      status.textContent = "Searching...";
      status.className = "status";
      badge.style.display = "none";

      try {
        const resp = await fetch("/search/doctors", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        const data = await resp.json();

        if (!resp.ok) {
          output.textContent = JSON.stringify(data, null, 2);
          status.textContent = `Error ${resp.status}`;
          status.className = "status error";
        } else {
          output.textContent = JSON.stringify(data, null, 2);
          badge.textContent = `${data.total} result${data.total !== 1 ? "s" : ""}`;
          badge.style.display = "inline";
          status.textContent = "";
          status.className = "status";
        }
      } catch (err) {
        output.textContent = "";
        status.textContent = "Could not reach the API. Is the server running?";
        status.className = "status error";
      } finally {
        btn.disabled = false;
      }
    }

    document.querySelectorAll("input").forEach(el => {
      el.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });
    });
  </script>
</body>
</html>
